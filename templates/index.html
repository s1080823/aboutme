<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呂芳妤的個人網站</title>
    <style>
        :root {
            --primary-color: #c2185b;
            --accent-color: #f06292;
            --bg-color: #fff0f5;
            --text-color: #4a4a4a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: block;
            padding-top: 50px;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            display: flex;
            gap: 20px;
            text-align: left;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 2.5rem;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            display: inline-block;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .nav-link {
            text-decoration: none;
            color: white;
            background-color: var(--accent-color);
            padding: 15px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .nav-link:hover {
            background-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* 針對不同功能區塊上色 (可選) */
        .nav-link[href*="math"] { background-color: #ff4d6d; }
        .nav-link[href*="cup"] { background-color: #00b894; }
        .nav-link[href*="read"] { background-color: #0984e3; }

        @media (max-width: 600px) {
            .nav-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>呂芳妤的個人首頁</h1>
    
    <div class="nav-grid">
        <a href="/about" class="nav-link">關於呂芳妤</a>
        <a href="/bio" class="nav-link">求職履歷</a>
    </div>
</div>

</body>
</html>
